<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ersun Türköz</title>
  <style>
    :root {
      --bg: #0d1b2a;
      --text: #e8ecef;
      --accent: #7d97a8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      letter-spacing: 0.02em;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    p.subtitle {
      margin-top: 12px;
      color: var(--accent);
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    p.note {
      margin-top: 48px;
      font-size: 0.95rem;
      color: var(--accent);
    }
    .line {
      width: 60px;
      height: 1px;
      background: var(--accent);
      margin: 24px 0;
    }
  </style>
</head>
<body>
  <h1>Ersun Türköz</h1>
  <p class="subtitle">Contemporary Ceramic Sculpture &amp; Painting</p>
  <div class="line"></div>
  <p class="note">Site yakında yayında — çok yakında burada olacağız.</p>
</body>
</html>
